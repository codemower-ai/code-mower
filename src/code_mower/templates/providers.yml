version: 1
provider_templates:
  acp_bridge:
    provider: "acp"
    driver: "local_cli"
    type: "audit"
    adapter: null
    trailer_lane: null
    spend_policy: "none"
    merge_authority: false
    informational: true
    enabled_by_default: false
    events: []
    token_env:
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "manual"
    provider_config:
      command_env: "CODE_MOWER_ACP_COMMAND"
      protocol: "agent-client-protocol"
      prompt_lenses:
        - "base-audit"
      status: "protocol research lane; no automatic merge authority"
    review_hygiene: {}
  aider:
    provider: "aider"
    driver: "local_cli"
    type: "audit"
    adapter: null
    trailer_lane: null
    spend_policy: "local"
    merge_authority: false
    informational: true
    enabled_by_default: false
    events: []
    token_env:
      - "AIDER_AUDIT_LABEL_TOKEN"
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "manual"
    provider_config:
      command: "aider"
      mode: "review-only"
      model_env: "AIDER_MODEL"
      api_base_env: "AIDER_API_BASE"
      status: "optional tool lane; provider-specific invocation belongs in an adapter"
    review_hygiene: {}
  antigravity_cli:
    provider: "antigravity"
    driver: "local_cli"
    type: "audit"
    adapter: null
    trailer_lane: null
    spend_policy: "included"
    merge_authority: false
    informational: true
    enabled_by_default: false
    events: []
    token_env:
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "manual"
    provider_config:
      command: "agy"
      alternate_commands:
        - "antigravity"
      command_env: "ANTIGRAVITY_CLI_COMMAND"
      model_env: "ANTIGRAVITY_MODEL"
      prompt_lenses:
        - "base-audit"
      required_env_truthy:
        - "ANTIGRAVITY_CLI_USE_AMBIENT_HOME"
      doctor_probe_args:
        - "--version"
      auth: "run `agy` login/install locally; set ANTIGRAVITY_CLI_USE_AMBIENT_HOME=1 to opt into local OAuth state in trusted environments"
      status: "forward Google CLI research lane; not merge authority until calibrated"
    review_hygiene: {}
  claude_audit:
    provider: "claude"
    driver: "local_cli"
    type: "audit"
    adapter: null
    trailer_lane: "claude"
    spend_policy: "included"
    merge_authority: true
    informational: false
    enabled_by_default: true
    events: []
    token_env:
      - "CLAUDE_AUDIT_LABEL_TOKEN"
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "label"
    provider_config:
      command: "claude"
      doctor_probe_args:
        - "--print"
        - "--output-format"
        - "json"
        - "--no-session-persistence"
        - "--setting-sources"
        - "local"
        - "--strict-mcp-config"
        - "--mcp-config"
        - '{"mcpServers":{}}'
        - "--disable-slash-commands"
        - "--tools"
        - ""
        - "--model"
        - "sonnet"
        - "--max-budget-usd"
        - "0.25"
        - "Reply with exactly: ok"
      doctor_probe_timeout_seconds: 30
      doctor_probe_expect_json: true
      doctor_probe_expect_json_field: "result"
      doctor_probe_expect_json_value: "ok"
      doctor_probe_error_fields:
        - "is_error"
        - "api_error_status"
      doctor_probe_auth_status_fields:
        - "api_error_status"
    review_hygiene: {}
  claude_review:
    provider: "claude"
    driver: "manual"
    type: "review"
    adapter: null
    trailer_lane: null
    spend_policy: "none"
    merge_authority: false
    informational: true
    enabled_by_default: true
    events: []
    token_env:
      - "CLAUDE_REVIEW_LABEL_TOKEN"
    token_env_any: []
    trigger_policy: "manual"
    provider_config: {}
    review_hygiene:
      workflow: ".github/workflows/claude-clear-stale.yml"
      token_env: "CLAUDE_REVIEW_LABEL_TOKEN"
  coderabbit_cli:
    provider: "coderabbit"
    driver: "local_cli"
    type: "audit"
    adapter: null
    trailer_lane: null
    spend_policy: "included"
    merge_authority: false
    informational: true
    enabled_by_default: false
    events: []
    token_env:
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "manual"
    provider_config:
      command: "coderabbit"
      alternate_commands:
        - "cr"
      status: "optional CLI lane for local/on-demand review capture"
    review_hygiene: {}
  codex:
    provider: "codex"
    driver: "local_cli"
    type: "audit"
    adapter: null
    trailer_lane: null
    spend_policy: "included"
    merge_authority: true
    informational: false
    enabled_by_default: true
    events: []
    token_env:
      - "CODEX_AUDIT_LABEL_TOKEN"
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "label"
    provider_config:
      command: "codex"
      doctor_probe_args:
        - "--version"
    review_hygiene: {}
  cursor_bugbot:
    provider: "cursor_bugbot"
    driver: "saas_event"
    type: "audit"
    adapter: "cursor_bugbot"
    trailer_lane: null
    spend_policy: "paid"
    merge_authority: false
    informational: true
    enabled_by_default: false
    events:
      - "issue_comment"
    token_env:
      - "CURSOR_BUGBOT_AUDIT_LABEL_TOKEN"
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "manual"
    provider_config:
      bot_authors:
        - "cursor[bot]"
        - "cursor"
      trigger_comments:
        - "bugbot run"
        - "@cursor review"
      rules_file: ".cursor/BUGBOT.md"
      status: "manual informational lane; keep calibration-only until enabled BugBot output shape is captured and adjudicated"
    review_hygiene: {}
  devin:
    provider: "devin"
    driver: "hosted_bridge"
    type: "audit"
    adapter: null
    trailer_lane: null
    spend_policy: "paid"
    merge_authority: true
    informational: false
    enabled_by_default: false
    events: []
    token_env:
      - "DEVIN_AUDIT_LABEL_TOKEN"
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "manual"
    provider_config: {}
    review_hygiene: {}
  gemini_cli:
    provider: "gemini"
    driver: "local_cli"
    type: "audit"
    adapter: null
    trailer_lane: null
    spend_policy: "included"
    merge_authority: false
    informational: true
    enabled_by_default: false
    events: []
    token_env:
      - "GITHUB_TOKEN"
    token_env_any:
      - ["GEMINI_API_KEY", "GOOGLE_API_KEY"]
    trigger_policy: "manual"
    provider_config:
      command: "gemini"
      command_env: "GEMINI_CLI_COMMAND"
      model_env: "GEMINI_MODEL"
      prompt_lenses:
        - "base-audit"
      doctor_probe_args:
        - "-p"
        - "Reply with exactly: ok"
        - "--output-format"
        - "json"
        - "--skip-trust"
      doctor_probe_timeout_seconds: 45
      doctor_probe_expect_json: true
      doctor_probe_expect_json_field: "response"
      doctor_probe_expect_json_value: "ok"
      status: "optional third-peer CLI lane; not merge authority until calibrated"
    review_hygiene: {}
  gitar:
    provider: "gitar"
    driver: "saas_event"
    type: "audit"
    adapter: "gitar"
    trailer_lane: null
    spend_policy: "included"
    merge_authority: false
    informational: true
    enabled_by_default: true
    events:
      - "issue_comment"
    token_env:
      - "GITAR_AUDIT_LABEL_TOKEN"
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "label"
    provider_config:
      bot_authors:
        - "gitar-ai[bot]"
        - "gitar-bot"
        - "gitar-bot[bot]"
    review_hygiene: {}
  greptile:
    provider: "greptile"
    driver: "saas_event"
    type: "audit"
    adapter: "greptile"
    trailer_lane: null
    spend_policy: "paid"
    merge_authority: false
    informational: true
    enabled_by_default: true
    events:
      - "pull_request_review"
      - "check_run"
    token_env:
      - "GREPTILE_AUDIT_LABEL_TOKEN"
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "label"
    provider_config:
      bot_authors:
        - "greptile-apps[bot]"
        - "greptile-apps"
      check_runs:
        - app_slug: "greptile-apps"
          name: "Greptile Review"
    review_hygiene: {}
  hermes_cli:
    provider: "hermes"
    driver: "local_cli"
    type: "audit"
    adapter: null
    trailer_lane: null
    spend_policy: "included"
    merge_authority: false
    informational: true
    enabled_by_default: false
    events: []
    token_env:
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "manual"
    provider_config:
      command: "hermes"
      command_env: "HERMES_CLI_COMMAND"
      model_env: "HERMES_INFERENCE_MODEL"
      provider_env: "HERMES_PROVIDER"
      prompt_lenses:
        - "base-audit"
      required_env_truthy:
        - "HERMES_CLI_USE_AMBIENT_HOME"
      doctor_probe_args:
        - "--version"
      auth: "run `hermes setup` or provider login locally; set HERMES_CLI_USE_AMBIENT_HOME=1 to opt into local Hermes auth/session state in trusted environments"
      status: "informational Hermes Agent one-shot lane; not merge authority until calibrated"
    review_hygiene: {}
  local_llm:
    provider: "openai_compatible"
    driver: "api_model"
    type: "audit"
    adapter: null
    trailer_lane: null
    spend_policy: "local"
    merge_authority: false
    informational: true
    enabled_by_default: false
    events: []
    token_env:
      - "LOCAL_LLM_AUDIT_LABEL_TOKEN"
      - "LOCAL_LLM_API_KEY"
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "manual"
    provider_config:
      api_base_env: "LOCAL_LLM_API_BASE"
      model_env: "LOCAL_LLM_MODEL"
      bot_authors_env: "LOCAL_LLM_BOT_AUTHORS"
      default_api_base: "http://localhost:1234/v1"
      profile_env: "LOCAL_LLM_PROFILE"
      profiles:
        qwen3-coder-next-lmstudio:
          api_base: "http://localhost:1234/v1"
          model: "qwen/qwen3-coder-next"
          context_window: "128000"
          endpoint: "lmstudio"
        gemma4-ollama:
          api_base: "http://localhost:11434/v1"
          model: "gemma4:e4b-mlx"
          context_window: "128000"
          endpoint: "ollama"
      status: "informational calibration lane, not merge authority"
    review_hygiene: {}
  qodo:
    provider: "qodo"
    driver: "saas_event"
    type: "audit"
    adapter: "qodo"
    trailer_lane: null
    spend_policy: "paid"
    merge_authority: false
    informational: true
    enabled_by_default: false
    events:
      - "issue_comment"
    token_env:
      - "QODO_AUDIT_LABEL_TOKEN"
      - "GITHUB_TOKEN"
    token_env_any: []
    trigger_policy: "manual"
    provider_config:
      bot_authors:
        - "qodo-code-review[bot]"
        - "qodo-code-review"
      spend_policy: "never trigger automatically from generated workflows"
    review_hygiene: {}
profiles:
  recommended:
    description: "Fast path for most teams; two local CLI peers plus an always-on advisory SaaS reviewer."
    lanes:
      - "codex"
      - "claude_audit"
      - "gitar"
    source: "repo"
  public_oss:
    description: "Public repository starter; use recommended today, swap Gitar for CodeRabbit once the CodeRabbit adapter lands."
    lanes:
      - "codex"
      - "claude_audit"
      - "gitar"
    source: "repo"
  deep_review:
    description: "Higher-scrutiny private repository profile; Greptile remains opt-in and informational to avoid surprise spend."
    lanes:
      - "codex"
      - "claude_audit"
      - "greptile"
    source: "repo"
  privacy:
    description: "Experimental low-cost/private calibration floor; local LLM is informational only until false-positive rates are measured."
    lanes:
      - "local_llm"
    source: "repo"
  tool_lane:
    description: "Optional local tool-lane proof; Aider stays manual and informational until its review adapter is calibrated."
    lanes:
      - "aider"
    source: "repo"
  third_peer:
    description: "Optional third local CLI reviewer calibration profile; Google and Hermes CLI lanes stay informational until catch rate and false positives are measured."
    lanes:
      - "antigravity_cli"
      - "gemini_cli"
      - "hermes_cli"
    source: "repo"
  cli_research:
    description: "Optional local CLI and protocol research profile; use for on-demand review capture, not routine merge gates."
    lanes:
      - "antigravity_cli"
      - "gemini_cli"
      - "hermes_cli"
      - "coderabbit_cli"
      - "acp_bridge"
    source: "repo"
  saas_research:
    description: "Optional manually triggered SaaS reviewer calibration profile; use for capture and value reports, not merge gates."
    lanes:
      - "cursor_bugbot"
      - "qodo"
    source: "repo"
