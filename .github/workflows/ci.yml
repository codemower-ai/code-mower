name: Code Mower CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip check

      - name: Privacy scan
        run: python scripts/privacy_scan.py

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Compile sources
        run: python -m compileall src scripts

      - name: Guard package workflow templates
        run: python scripts/guard_package_workflows.py

      - name: Easy-mode smoke
        run: python scripts/smoke_easy_mode.py --work-dir "$RUNNER_TEMP/code-mower-smoke" --json

      - name: Fresh-clone rehearsal
        run: >-
          python scripts/fresh_clone_rehearsal.py
          --repo-url "$GITHUB_WORKSPACE"
          --ref "$GITHUB_SHA"
          --work-dir "$RUNNER_TEMP/code-mower-fresh-clone"
          --json
