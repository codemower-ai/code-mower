name: Code Mower Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_testpypi:
        description: Publish the built distributions to TestPyPI.
        required: false
        default: false
        type: boolean
      publish_pypi:
        description: Publish the built distributions to PyPI.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-distributions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: code-mower-dist
          path: dist/*
          if-no-files-found: error

  verify-distributions:
    needs: build-distributions
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: code-mower-dist
          path: dist

      - name: Verify distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          python -m twine check dist/*

  publish-testpypi:
    needs: verify-distributions
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_testpypi == true) || (github.event_name == 'release' && vars.CODE_MOWER_TESTPYPI_PUBLISH == 'true') }}
    permissions:
      contents: read
      id-token: write
    environment: testpypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: code-mower-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: verify-distributions
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_pypi == true) || (github.event_name == 'release' && vars.CODE_MOWER_PYPI_PUBLISH == 'true') }}
    permissions:
      contents: read
      id-token: write
    environment: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: code-mower-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
