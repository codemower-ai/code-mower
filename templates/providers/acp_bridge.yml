acp_bridge:
  provider: "acp"
  driver: "local_cli"
  type: "audit"
  adapter: null
  trailer_lane: null
  spend_policy: "none"
  merge_authority: false
  informational: true
  enabled_by_default: false
  events: []
  token_env:
    - "GITHUB_TOKEN"
  token_env_any: []
  trigger_policy: "manual"
  provider_config:
    command_env: "CODE_MOWER_ACP_COMMAND"
    protocol: "agent-client-protocol"
    prompt_lenses:
      - "base-audit"
    status: "protocol research lane; no automatic merge authority"
  review_hygiene: {}
